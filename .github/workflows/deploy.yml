name: Deploy to TestFlight

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Write App Store Connect key
        run: |
          echo "${{ secrets.ASC_KEY_CONTENT }}" | base64 --decode > ios/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Import distribution certificate
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/campo.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$DIST_CERT_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains \
            -d user -s "$KEYCHAIN_PATH" login.keychain-db

          rm /tmp/cert.p12

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Build & deploy
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: "../AuthKey_${{ secrets.ASC_KEY_ID }}.p8"
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: fastlane beta

      - name: Cleanup
        if: always()
        run: |
          rm -f ios/*.p8
          security delete-keychain $RUNNER_TEMP/campo.keychain-db 2>/dev/null || true
