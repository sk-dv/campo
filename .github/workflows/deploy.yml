name: Deploy to TestFlight

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  deploy:
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ hashFiles('ios/Gemfile.lock') }}
          restore-keys: gems-

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        working-directory: ios
        run: pod install

      - name: Install Fastlane
        working-directory: ios
        run: |
          bundle config path ../vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Write App Store Connect key
        run: |
          echo "${{ secrets.ASC_KEY_CONTENT }}" | base64 --decode > ios/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          echo "ASC_KEY_FILEPATH=AuthKey_${{ secrets.ASC_KEY_ID }}.p8" >> $GITHUB_ENV

      - name: Import distribution certificate
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/campo.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$DIST_CERT_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains \
            -d user -s "$KEYCHAIN_PATH" login.keychain-db

          rm /tmp/cert.p12

      - name: Build & deploy
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: ${{ env.ASC_KEY_FILEPATH }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: bundle exec fastlane beta

      - name: Debug build logs on failure
        if: failure()
        run: |
          grep -A 5 "error:" ~/Library/Logs/gym/Runner-Runner.log || echo "No gym log found"

      - name: Cleanup
        if: always()
        run: |
          rm -f ios/*.p8
          security delete-keychain $RUNNER_TEMP/campo.keychain-db 2>/dev/null || true
